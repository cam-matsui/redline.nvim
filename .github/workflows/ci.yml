name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (nvim ${{ matrix.nvim }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nvim: [v0.11.0, stable, nightly]
    # Nightly can break from upstream churn unrelated to this plugin; don't let
    # it fail the whole run.
    continue-on-error: ${{ matrix.nvim == 'nightly' }}
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim }}
      - name: Run tests
        run: make test

  stylua:
    name: stylua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ plugin/ tests/
